name: Deploy

on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Test
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint (advisory)
        run: npx eslint . --ext .js || true

        continue-on-error: true
      - name: Run tests
        run: |
          # Use project test script if defined, otherwise echo and pass
          if node -e "const p=require('./package.json'); process.exit(p.scripts&&p.scripts.test?0:1)" 2>/dev/null; then
            npm test
          else
            echo "No test script defined - skipping"
          fi

  # ---------------------------------------------------------------------------
  # Build  (validate Terraform)
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

  # ---------------------------------------------------------------------------
  # Deploy
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    env:
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
      TF_VAR_db_name: ${{ secrets.DB_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      # -----------------------------------------------------------------------
      # Generate SSH key pair for this deployment
      # -----------------------------------------------------------------------
      - name: Generate SSH key pair
        run: |
          ssh-keygen -t rsa -b 4096 -f /tmp/deploy_key -N ""
          echo "SSH_PUBLIC_KEY=$(cat /tmp/deploy_key.pub)" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # Terraform - provision infra
      # -----------------------------------------------------------------------
      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="public_key=${SSH_PUBLIC_KEY}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      # -----------------------------------------------------------------------
      # Capture Terraform outputs
      # -----------------------------------------------------------------------
      - name: Capture Terraform outputs
        working-directory: terraform
        run: |
          EC2_PUBLIC_IP=$(terraform output -raw ec2_public_ip)
          RDS_ENDPOINT=$(terraform output -raw rds_endpoint)
          echo "EC2_PUBLIC_IP=${EC2_PUBLIC_IP}" >> $GITHUB_ENV
          echo "RDS_ENDPOINT=${RDS_ENDPOINT}"   >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # Wait for EC2 SSH to be ready
      # -----------------------------------------------------------------------
      - name: Wait for SSH
        run: |
          echo "Waiting for SSH on $EC2_PUBLIC_IP ..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   -i /tmp/deploy_key \
                   ubuntu@${EC2_PUBLIC_IP} "echo ready" 2>/dev/null; then
              echo "SSH is up"
              exit 0
            fi
            echo "Attempt $i/30 - sleeping 10s"
            sleep 10
          done
          echo "SSH never became available" >&2
          exit 1

      # -----------------------------------------------------------------------
      # Ansible - configure server and deploy app
      # -----------------------------------------------------------------------
      - name: Setup Python / Ansible
        run: |
          pip install --upgrade pip
          pip install ansible

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          SERVER_IP: ${{ env.EC2_PUBLIC_IP }}
          RDS_ENDPOINT: ${{ env.RDS_ENDPOINT }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          ansible-playbook \
            -i "${SERVER_IP}," \
            -u ubuntu \
            --private-key /tmp/deploy_key \
            --extra-vars "rds_endpoint=${RDS_ENDPOINT} db_username=${DB_USERNAME} db_password=${DB_PASSWORD} db_name=${DB_NAME}" \
            ansible/playbook.yml

      # -----------------------------------------------------------------------
      # Smoke test - verify the app is reachable and healthy
      # -----------------------------------------------------------------------
      - name: Smoke test
        run: |
          APP_URL="http://${EC2_PUBLIC_IP}"
          echo "Smoke testing ${APP_URL}/health ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${APP_URL}/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" =~ ^[23] ]]; then
              echo "Smoke test PASSED (HTTP $STATUS)"
              exit 0
            fi
            sleep 15
          done
          echo "Smoke test FAILED - app did not return 2xx/3xx after 3 minutes" >&2
          exit 1

      # -----------------------------------------------------------------------
      # Terraform Destroy (cleanup - comment out to keep infra running)
      # -----------------------------------------------------------------------
      # - name: Terraform Destroy
      #   if: always()
      #   working-directory: terraform
      #   run: |
      #     terraform destroy -auto-approve \
      #       -var="public_key=PLACEHOLDER"